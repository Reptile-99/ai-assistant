services:
  # Backend Service
  - type: web
    name: ai-study-assistant-server
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      # ── Gemini AI (FREE - Primary Provider) ──
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: GEMINI_MAX_TOKENS
        value: 2048
      - key: GEMINI_TEMPERATURE
        value: 0.3
      # ── OpenAI (Fallback Provider) ──
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_MAX_TOKENS
        value: 2000
      - key: OPENAI_TEMPERATURE
        value: 0.3
      - key: OPENAI_TIMEOUT_MS
        value: 30000
      # ── Pinecone ──
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_ENVIRONMENT
        sync: false
      - key: PINECONE_INDEX_NAME
        value: study-assistant
      - key: PINECONE_NAMESPACE
        value: documents
      # ── RAG ──
      - key: EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: EMBEDDING_DIMENSIONS
        value: 1536
      - key: RAG_TOP_K
        value: 5
      - key: RAG_MIN_SCORE
        value: 0.7
      # ── Rate Limiting ──
      - key: RATE_LIMIT_WINDOW_MS
        value: 60000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 20
      # ── CORS ──
      - key: CLIENT_URL
        sync: false

  # Frontend Service (Static/Next.js)
  # Note: Render can host Next.js as a web service, but Vercel is usually preferred.
  # This config is provided if you want to host both on Render.
  - type: web
    name: ai-study-assistant-client
    env: node
    plan: free
    rootDir: client
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
