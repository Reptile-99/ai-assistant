services:
  # Backend Service
  - type: web
    name: ai-study-assistant-server
    env: node
    plan: free
    buildCommand: cd server && npm install && npm run build
    startCommand: cd server && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: CLIENT_URL
        sync: false

  # Frontend Service (Static/Next.js)
  # Note: Render can host Next.js as a web service, but Vercel is usually preferred.
  # This config is provided if you want to host both on Render.
  - type: web
    name: ai-study-assistant-client
    env: node
    plan: free
    buildCommand: cd client && npm install && npm run build
    startCommand: cd client && npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
